<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — HotShotz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- Bottom nav included directly -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="nav-tab" onclick="location.href='index.html'" aria-label="Feed">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Feed</span>
    </button>
    <button class="nav-tab" onclick="location.href='index.html#leader'" aria-label="Leaderboard">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
      <span>Rank</span>
    </button>
    <button class="nav-upload" onclick="location.href='index.html#upload'" aria-label="Upload">
      <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="nav-tab active" aria-label="Profile">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <div class="page" id="profile-root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:40vh">
      <div class="btn-spinner"></div>
    </div>
  </div>

  <script>
    const GRADIENTS = [
      'linear-gradient(135deg,#6c63ff,#a78bfa)',
      'linear-gradient(135deg,#ff4d6d,#ff8c42)',
      'linear-gradient(135deg,#10d98a,#06b6d4)',
      'linear-gradient(135deg,#f59e0b,#fbbf24)',
      'linear-gradient(135deg,#6c63ff,#db2777)',
      'linear-gradient(135deg,#0891b2,#059669)',
      'linear-gradient(135deg,#dc2626,#b91c1c)',
      'linear-gradient(135deg,#7c3aed,#4f46e5)',
    ];
    const CAT = {poetry:'✍️ Poetry',photography:'🖼️ Photo',story:'📖 Story',art:'🎨 Art',music:'🎵 Music',other:'✨ Other'};

    function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }

    let activeTab = 'photos';

    async function loadProfile() {
      const token = localStorage.getItem('hs_token');
      const user  = JSON.parse(localStorage.getItem('hs_user') || 'null');
      if (!user) { window.location.href = 'login.html'; return; }

      let apiUser = user, submissions = [];
      try {
        const res  = await fetch('/api/users/me', { headers:{ Authorization:`Bearer ${token}` } });
        const data = await res.json();
        if (data.success) { apiUser = data.user; submissions = data.submissions || []; }
      } catch {}

      renderProfile(apiUser, submissions);
    }

    function renderProfile(u, submissions) {
      const initials = (u.username||'U').slice(0,2).toUpperCase();
      const grad     = GRADIENTS[(u.avatar||0)%8];

      document.getElementById('profile-root').innerHTML = `
        <!-- Header -->
        <div class="profile-header u1">
          <div class="profile-topbar">
            <h2 class="profile-h2">Profile</h2>
            <button class="btn-g profile-edit">Edit ✏️</button>
          </div>
          <div class="profile-row">
            <div class="profile-av-wrap">
              <div class="av" style="width:86px;height:86px;font-size:28px;background:${grad};border:3px solid rgba(108,99,255,.5);box-shadow:0 0 0 6px rgba(108,99,255,.1),0 0 28px rgba(108,99,255,.3)">${initials}</div>
              <div class="profile-av-online">✓</div>
            </div>
            <div style="flex:1">
              <h3 class="profile-name">${esc(u.username)}</h3>
              <p class="profile-college">🎓 ${esc(u.college||'Unknown College')}</p>
              <div class="profile-badge">
                <span class="badge badge-amber">🔥 Top Contributor</span>
              </div>
            </div>
          </div>
          <!-- Stats -->
          <div class="stats-grid4">
            <div class="glass"><div class="sg4-icon">📸</div><div class="sg4-val">${u.submissionCount||submissions.length||0}</div><div class="sg4-lbl">Photos</div></div>
            <div class="glass"><div class="sg4-icon">🔥</div><div class="sg4-val">${(u.totalVotesReceived||0).toLocaleString()}</div><div class="sg4-lbl">Votes</div></div>
            <div class="glass"><div class="sg4-icon">🏆</div><div class="sg4-val">#—</div><div class="sg4-lbl">Rank</div></div>
            <div class="glass"><div class="sg4-icon">⚡</div><div class="sg4-val">${u.submissionCount||0}w</div><div class="sg4-lbl">Streak</div></div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs u2">
          <button class="profile-tab active" onclick="switchTab('photos',this)">Photos</button>
          <button class="profile-tab"        onclick="switchTab('votes',this)">Votes</button>
          <button class="profile-tab"        onclick="switchTab('activity',this)">Activity</button>
        </div>

        <!-- Photos tab -->
        <div id="tab-photos">
          ${submissions.length === 0
            ? `<div style="text-align:center;padding:48px;color:var(--muted)">
                <div style="font-size:40px;margin-bottom:12px">📸</div>
                <p style="font-weight:600;font-size:15px">No approved shots yet</p>
                <p style="font-size:13px;margin-top:6px">Submit your first shot this week!</p>
                <a href="index.html" class="btn-p" style="display:inline-block;margin-top:20px;padding:13px 28px;font-size:14px;text-decoration:none">Drop a Shot 🔥</a>
               </div>`
            : `<div class="photo-grid">
                ${submissions.map((s,i) => `
                  <div class="photo-cell" style="animation:fadeUp .4s var(--ease) ${i*.06}s both">
                    ${s.imageUrl
                      ? `<img src="${esc(s.imageUrl)}" alt="${esc(s.title)}" loading="lazy">`
                      : `<div style="width:100%;height:100%;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:28px">${CAT[s.category]?.split(' ')[0]||'📄'}</div>`}
                    <div class="photo-cell-overlay">🔥 ${s.voteCount||0}</div>
                    ${s.isWinner ? `<div style="position:absolute;top:6px;right:6px"><span class="badge badge-amber" style="font-size:9px;padding:2px 7px">${['🥇','🥈','🥉'][s.rank-1]||'🏆'}</span></div>` : ''}
                  </div>`).join('')}
                ${Array(Math.max(0, 6 - submissions.length)).fill('<div class="photo-cell-empty">+</div>').join('')}
              </div>`}
        </div>

        <!-- Activity tab (hidden) -->
        <div id="tab-votes" style="display:none" class="activity-list">
          <p style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Your voting history will appear here.</p>
        </div>

        <div id="tab-activity" style="display:none" class="activity-list">
          ${[
            {icon:'🔥',bg:'rgba(255,77,109,.15)',text:'Your photo received new votes',time:'2h ago'},
            {icon:'🏆',bg:'rgba(245,158,11,.15)',text:'Weekly contest started — submit now!',time:'1d ago'},
            {icon:'⚡',bg:'rgba(16,217,138,.15)',text:'Submission streak continues!',time:'2d ago'},
          ].map((a,i) => `
            <div class="activity-row glass" style="animation:slideInR .4s var(--ease) ${i*.06}s both">
              <div class="activity-icon-box" style="background:${a.bg}">${a.icon}</div>
              <div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>
            </div>`).join('')}
        </div>

        <!-- Sign out -->
        <div style="padding:28px 20px;text-align:center">
          <button onclick="signOut()" style="background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);color:#f87171;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">
            Sign Out
          </button>
        </div>
      `;
    }

    function switchTab(name, btn) {
      ['photos','votes','activity'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
        if (t === 'votes' || t === 'activity') document.getElementById(`tab-${t}`).style.display = t === name ? 'flex' : 'none';
      });
      document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function signOut() {
      localStorage.removeItem('hs_token');
      localStorage.removeItem('hs_user');
      window.location.href = 'login.html';
    }

    loadProfile();
  </script>
</body>
</html>
