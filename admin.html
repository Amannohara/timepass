<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — HotShotz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-wrap { max-width:900px;margin:0 auto;padding:28px 24px 60px; }
    .admin-h1   { font-family:var(--font-d);font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px; }
    .key-bar    { display:flex;gap:12px;margin:24px 0 28px;flex-wrap:wrap; }
    .admin-table{ width:100%;border-collapse:collapse;background:rgba(255,255,255,.03);border-radius:16px;overflow:hidden; }
    .admin-table th { padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border); }
    .admin-table td { padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle; }
    .admin-table tr:last-child td { border-bottom:none; }
    .admin-table tr:hover td { background:rgba(255,255,255,.02); }
    .action-row { display:flex;gap:8px; }
    .act-btn    { padding:6px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-b);transition:all .15s; }
    .act-approve{ background:rgba(16,217,138,.15);border:1px solid rgba(16,217,138,.3);color:var(--green); }
    .act-approve:hover { background:rgba(16,217,138,.25); }
    .act-reject { background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);color:var(--hot); }
    .act-reject:hover  { background:rgba(255,77,109,.22); }
    .status-badge { font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px; }
    .status-pending  { background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3); }
    .status-approved { background:rgba(16,217,138,.12);color:var(--green);border:1px solid rgba(16,217,138,.25); }
    .status-rejected { background:rgba(255,77,109,.1);color:var(--hot);border:1px solid rgba(255,77,109,.2); }
    .alert { padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:16px;display:none; }
    .alert.show     { display:block; }
    .alert-ok  { background:rgba(16,217,138,.12);border:1px solid rgba(16,217,138,.3);color:#6ee7b7; }
    .alert-err { background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:#fca5a5; }
  </style>
</head>
<body>
  <div class="blobs" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

  <div class="admin-wrap">
    <div class="u1">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div class="land-logo-box" style="width:34px;height:34px;border-radius:11px">
          <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        </div>
        <span class="admin-h1">Admin Panel</span>
      </div>
      <p style="color:var(--muted2);font-size:14px">Review submissions · Compute weekly winners</p>
    </div>

    <div class="key-bar u2">
      <input class="inp" id="admin-key" type="password" placeholder="Admin secret key…" style="flex:1;min-width:200px">
      <button class="btn-p" style="padding:12px 22px;font-size:14px" onclick="loadSubmissions()">Load Submissions</button>
      <button style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber);padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer" onclick="computeWinners()">⚡ Compute Winners</button>
    </div>

    <div class="alert" id="alert-box"></div>

    <!-- Tabs -->
    <div class="tab-pills u2" style="margin-bottom:18px">
      <button class="tab-pill active" onclick="switchTab('pending',this)">Pending</button>
      <button class="tab-pill"        onclick="switchTab('approved',this)">Approved</button>
      <button class="tab-pill"        onclick="switchTab('rejected',this)">Rejected</button>
    </div>

    <div id="count-label" style="font-size:13px;color:var(--muted);margin-bottom:14px">—</div>

    <div style="overflow-x:auto;border-radius:16px;border:1px solid var(--border)">
      <table class="admin-table">
        <thead>
          <tr><th>Title</th><th>Category</th><th>Author</th><th>Status</th><th>Votes</th><th>Actions</th></tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Enter your admin key and click Load</td></tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top:32px;text-align:right">
      <a href="index.html" style="color:var(--muted2);font-size:13px">← Back to app</a>
    </div>
  </div>

  <script>
    let currentTab = 'pending';
    function key() { return document.getElementById('admin-key').value.trim(); }

    function showAlert(msg, type='ok') {
      const el = document.getElementById('alert-box');
      el.textContent = msg;
      el.className = `alert show alert-${type}`;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadSubmissions();
    }

    function esc(s) { return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }

    async function loadSubmissions() {
      const k = key();
      if (!k) { showAlert('Enter admin key first.','err'); return; }
      const body = document.getElementById('table-body');
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--muted)">Loading…</td></tr>';

      try {
        const res  = await fetch(`/api/admin/submissions?status=${currentTab}`, { headers:{'x-admin-key':k} });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        document.getElementById('count-label').textContent = `${data.data.length} ${currentTab} submission${data.data.length!==1?'s':''}`;

        if (!data.data.length) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">No submissions found.</td></tr>'; return; }

        body.innerHTML = data.data.map(s => `
          <tr id="row-${s._id}">
            <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.title)}</td>
            <td style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em">${esc(s.category)}</td>
            <td>
              <div style="font-weight:600">${esc(s.authorName)}</div>
              <div style="font-size:11px;color:var(--muted)">${esc(s.authorCollege||'')}</div>
            </td>
            <td><span class="status-badge status-${s.status}">${s.status}</span></td>
            <td style="font-family:var(--font-d);font-weight:800">🔥 ${s.voteCount||0}</td>
            <td>
              <div class="action-row">
                ${s.status!=='approved'?`<button class="act-btn act-approve" onclick="act('${s._id}','approve')">✅ Approve</button>`:''}
                ${s.status!=='rejected'?`<button class="act-btn act-reject"  onclick="act('${s._id}','reject')">❌ Reject</button>`:''}
              </div>
            </td>
          </tr>`).join('');
      } catch(err) {
        body.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--hot)">${esc(err.message)}</td></tr>`;
        showAlert(err.message,'err');
      }
    }

    async function act(id, type) {
      const k = key();
      try {
        const res  = await fetch(`/api/admin/${type}/${id}`, { method:'PATCH', headers:{'x-admin-key':k} });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showAlert(`✅ ${type === 'approve' ? 'Approved' : 'Rejected'} successfully!`);
        document.getElementById(`row-${id}`)?.remove();
      } catch(err) { showAlert(err.message,'err'); }
    }

    async function computeWinners() {
      const k = key();
      if (!k) { showAlert('Enter admin key first.','err'); return; }
      try {
        const res  = await fetch('/api/winners/compute', { method:'POST', headers:{'Content-Type':'application/json','x-admin-key':k}, body:'{}' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showAlert(`🏆 Winners computed! ${(data.data||[]).map(w=>`#${w.rank} ${w.title}`).join(', ')}`);
      } catch(err) { showAlert(err.message,'err'); }
    }
  </script>
</body>
</html>
